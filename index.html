<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>CollectX — Trade Pokémon Cards & Manage Your Collection</title>
    <meta name="description" content="Catalogue and trade Pokémon cards with other collectors." />
    <meta name="keywords" content="pokemon cards, trading, collection, TCG, marketplace, pokemon, cards, trading cards" />
    <meta name="author" content="CollectX" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CollectX" />
    <meta property="og:title" content="CollectX — Trade Pokémon Cards & Manage Your Collection" />
    <meta property="og:description" content="Catalogue and trade Pokémon cards with other collectors." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CollectX — Trade Pokémon Cards & Manage Your Collection" />
    <meta name="twitter:description" content="Catalogue and trade Pokémon cards with other collectors." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Security: nosniff is the only http-equiv directive browsers still honor reliably.
         X-Frame-Options and X-XSS-Protection must be HTTP headers, not meta tags. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
